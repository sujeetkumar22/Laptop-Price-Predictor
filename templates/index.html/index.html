<!DOCTYPE html>
<html>
<head>
    <title>Laptop Price Predictor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Laptop Price Predictor</h1>
        <form action="/predict" method="post">
            <div class="form-group">
                <label>Company:</label>
                <select name="company" required>
                    {% for company in companies %}
                        <option value="{{ company }}">{{ company }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label>Type:</label>
                <select name="type" required>
                    {% for type in types %}
                        <option value="{{ type }}">{{ type }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label>RAM (GB):</label>
                <input type="number" name="ram" min="2" max="64" required>
            </div>
            
            <div class="form-group">
                <label>Weight (kg):</label>
                <input type="number" step="0.1" name="weight" min="0.5" max="5" required>
            </div>
            
            <div class="form-group">
                <label>Touchscreen:</label>
                <select name="touchscreen" required>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>IPS Display:</label>
                <select name="ips" required>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>PPI (Pixels Per Inch):</label>
                <input type="number" name="ppi" min="50" max="500" required>
            </div>
            
            <div class="form-group">
                <label>CPU Brand:</label>
                <select name="cpu_brand" required>
                    {% for cpu in cpu_brands %}
                        <option value="{{ cpu }}">{{ cpu }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label>HDD (GB):</label>
                <input type="number" name="hdd" min="0" max="2000" value="0">
            </div>
            
            <div class="form-group">
                <label>SSD (GB):</label>
                <input type="number" name="ssd" min="0" max="2000" value="0">
            </div>
            
            <div class="form-group">
                <label>GPU Brand:</label>
                <select name="gpu_brand" required>
                    {% for gpu in gpu_brands %}
                        <option value="{{ gpu }}">{{ gpu }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label>Operating System:</label>
                <select name="os" required>
                    {% for os_item in os %}
                        <option value="{{ os_item }}">{{ os_item }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <button type="submit">Predict Price</button>
        </form>
    </div>
</body>
</html>
